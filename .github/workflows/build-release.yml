name: Build Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: RVC_VoiceBank_Packer_Windows_x86_64
            ext: zip
            exe: RVC_VoiceBank_Packer.exe
          - os: ubuntu-latest
            artifact: RVC_VoiceBank_Packer_Linux_x86_64
            ext: tar.gz
            exe: RVC_VoiceBank_Packer

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller onnx numpy

      - name: Install tkinter (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk tk-dev

      - name: Build with PyInstaller
        run: |
          pyinstaller packer.spec --noconfirm

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "dist\RVC_VoiceBank_Packer\*" -DestinationPath "dist\${{ matrix.artifact }}.zip"

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          cd dist
          tar czf ${{ matrix.artifact }}.tar.gz RVC_VoiceBank_Packer/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/*.zip
            dist/*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifact files
        run: |
          mkdir -p release_files
          find artifacts -type f \( -name "*.zip" -o -name "*.tar.gz" \) -exec cp {} release_files/ \;
          ls -lh release_files/

      - name: Delete existing release if present
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "Checking for existing release at tag: $TAG"
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          if [ "$HTTP_CODE" = "200" ]; then
            RELEASE_ID=$(echo "$BODY" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])" 2>/dev/null || echo "")
            if [ -n "$RELEASE_ID" ]; then
              echo "Deleting existing release ID: $RELEASE_ID"
              curl -s -X DELETE \
                -H "Authorization: token $GH_TOKEN" \
                "https://api.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID"
              echo "Deleted."
            fi
          else
            echo "No existing release found (HTTP $HTTP_CODE), proceeding."
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
          files: release_files/*
          body: |
            ## Downloads
            - **Windows**: `RVC_VoiceBank_Packer_Windows_x86_64.zip` — Extract and run `RVC_VoiceBank_Packer.exe`
            - **Linux**: `RVC_VoiceBank_Packer_Linux_x86_64.tar.gz` — Extract and run `./RVC_VoiceBank_Packer`
          generate_release_notes: true
