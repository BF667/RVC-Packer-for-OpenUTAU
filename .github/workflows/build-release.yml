name: Build Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: RVC_VoiceBank_Packer_Windows_x86_64
            ext: zip
            exe: RVC_VoiceBank_Packer.exe
          - os: ubuntu-latest
            artifact: RVC_VoiceBank_Packer_Linux_x86_64
            ext: tar.gz
            exe: RVC_VoiceBank_Packer

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller onnx numpy

      - name: Install tkinter (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk tk-dev

      - name: Build with PyInstaller
        run: |
          pyinstaller packer.spec --noconfirm

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "dist\RVC_VoiceBank_Packer\*" -DestinationPath "dist\${{ matrix.artifact }}.zip"

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          cd dist
          tar czf ${{ matrix.artifact }}.tar.gz RVC_VoiceBank_Packer/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/*.zip
            dist/*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
